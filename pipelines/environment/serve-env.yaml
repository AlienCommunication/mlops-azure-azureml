$schema: https://azuremlschemas.azureedge.net/latest/environment.schema.json
name: used-car-serving-env
version: 1
image: mcr.microsoft.com/azureml/openmpi4.1.0-ubuntu20.04:latest
conda_file:
  channels:
    - conda-forge
  dependencies:
    - python=3.10
    - pip
    - pip:
        # Hosts score.py in managed online deployments; mandatory for
        # custom serving environments.
        - azureml-inference-server-http~=1.0
        - scikit-learn==1.5.1
        - pandas==2.2.2
        - numpy==1.26.4
        - joblib==1.4.2
