$schema: https://azuremlschemas.azureedge.net/latest/managedOnlineDeployment.schema.json
name: blue
endpoint_name: used-car-price
model: azureml:used-car-price-model:1
code_configuration:
  code: ../
  scoring_script: src/score.py
environment: azureml:used-car-training-env@latest
instance_type: Standard_DS3_v2
instance_count: 1
request_settings:
  request_timeout_ms: 15000
  max_concurrent_requests_per_instance: 1
liveness_probe:
  initial_delay: 30
  period: 10
  timeout: 2
readiness_probe:
  initial_delay: 30
  period: 10
  timeout: 2
