name: cd-test-prod

on:
  workflow_dispatch:

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    environment: test
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      MODEL_NAME: used-car-price-model
      MODEL_VERSION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r azure-mlops/requirements.txt
      - name: Deploy to test
        run: |
          cd azure-mlops
          PYTHONPATH=. python pipelines/deploy_model.py --env test --model-name $MODEL_NAME --model-version $MODEL_VERSION --source registry

      - name: Smoke test test endpoint
        run: |
          cd azure-mlops
          PYTHONPATH=. python pipelines/smoke_test_endpoint.py --env test

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-test
    environment: prod
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      MODEL_NAME: used-car-price-model
      MODEL_VERSION: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r azure-mlops/requirements.txt
      - name: Deploy to prod
        run: |
          cd azure-mlops
          PYTHONPATH=. python pipelines/deploy_model.py --env prod --model-name $MODEL_NAME --model-version $MODEL_VERSION --source registry
