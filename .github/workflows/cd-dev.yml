name: cd-dev

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  train-dev:
    runs-on: ubuntu-latest
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r mlops-azure-azureml/requirements.txt
      - name: Generate training data
        run: python mlops-azure-azureml/data/generate_used_car_data.py --rows 10000 --output mlops-azure-azureml/data/used_cars.csv
      - name: Submit Azure ML pipeline
        run: |
          cd mlops-azure-azureml
          PYTHONPATH=. python pipelines/submit_training_pipeline.py --env dev --data data/used_cars.csv
