trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  - group: aml-dev-shared
  - name: pythonVersion
    value: '3.10'
  - name: projectRoot
    value: '.'
  - name: serviceConnection
    value: 'az-mlops-sc'
  - name: location
    value: 'eastus'
  - name: modelName
    value: 'used-car-price-model'
  # Self-hosted VMSS pool inside the VNet; required for any stage that talks
  # to the private AML workspaces (train, promote, deploy, smoke test).
  - name: selfHostedPool
    value: 'aml-selfhosted-agents'

stages:
  - stage: Validate
    displayName: Validate Code And Templates
    jobs:
      - job: validate
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: |
              python -m pip install --upgrade pip
              pip install -r $(projectRoot)/requirements.txt
            displayName: Install dependencies
          - script: |
              cd $(projectRoot)
              PYTHONPATH=. python data/generate_used_car_data.py --rows 500 --output /tmp/used_cars_ci.csv
              PYTHONPATH=. python -m src.train --train_data /tmp/used_cars_ci.csv --model_output /tmp/used-car-model --metrics_output /tmp/used-car-metrics.json
              PYTHONPATH=. python -m src.evaluate --metrics_input /tmp/used-car-metrics.json --evaluation_output /tmp/used-car-eval.json
            displayName: Developer smoke validation
  - stage: Train_Dev
    displayName: Train And Register In Dev
    dependsOn: Validate
    condition: succeeded()
    jobs:
      - job: train_dev
        pool:
          name: $(selfHostedPool)
        steps:
          - checkout: self
          - script: |
              python3 -m venv $(Pipeline.Workspace)/mlops-venv
              . $(Pipeline.Workspace)/mlops-venv/bin/activate
              python -m pip install --upgrade pip
              pip install -r $(projectRoot)/requirements.txt
            displayName: Install dependencies
          - script: |
              echo "This pipeline assumes the Terraform infra pipeline has already provisioned AML, networking, and Azure DevOps foundation resources."
            displayName: Confirm infra prerequisite
          - task: AzureCLI@2
            displayName: Ensure training data asset
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                . $(Pipeline.Workspace)/mlops-venv/bin/activate
                cd $(projectRoot)
                PYTHONPATH=. python data/generate_used_car_data.py --rows 10000 --output $(Pipeline.Workspace)/used_cars_train.csv
                PYTHONPATH=. python pipelines/register_data.py --env dev --csv $(Pipeline.Workspace)/used_cars_train.csv
          - task: AzureCLI@2
            name: submit
            displayName: Train, gate, and register model
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                . $(Pipeline.Workspace)/mlops-venv/bin/activate
                cd $(projectRoot)
                PYTHONPATH=. python pipelines/submit_training_pipeline.py \
                  --env dev \
                  --data azureml:used-car-training-reference:1 \
                  --wait \
                  --register-model

  - stage: Promote_To_Test
    displayName: Promote Approved Model To Registry
    dependsOn: Train_Dev
    condition: succeeded()
    variables:
      WORKSPACE_MODEL_VERSION: $[ stageDependencies.Train_Dev.train_dev.outputs['submit.WORKSPACE_MODEL_VERSION'] ]
    jobs:
      - deployment: promote_model
        environment: aml-test-approval
        pool:
          name: $(selfHostedPool)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: |
                    python3 -m venv $(Pipeline.Workspace)/mlops-venv
                    . $(Pipeline.Workspace)/mlops-venv/bin/activate
                    python -m pip install --upgrade pip
                    pip install -r $(projectRoot)/requirements.txt
                  displayName: Install dependencies
                - task: AzureCLI@2
                  name: promote
                  displayName: Promote workspace model to registry
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      . $(Pipeline.Workspace)/mlops-venv/bin/activate
                      cd $(projectRoot)
                      PYTHONPATH=. python pipelines/promote_model.py \
                        --env dev \
                        --model-name $(modelName) \
                        --workspace-model-version $(WORKSPACE_MODEL_VERSION)

  - stage: Deploy_Test
    displayName: Deploy To Test
    dependsOn: Promote_To_Test
    condition: succeeded()
    variables:
      REGISTRY_MODEL_VERSION: $[ stageDependencies.Promote_To_Test.promote_model.outputs['promote_model.promote.REGISTRY_MODEL_VERSION'] ]
    jobs:
      - deployment: deploy_test
        environment: aml-test
        pool:
          name: $(selfHostedPool)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: |
                    python3 -m venv $(Pipeline.Workspace)/mlops-venv
                    . $(Pipeline.Workspace)/mlops-venv/bin/activate
                    python -m pip install --upgrade pip
                    pip install -r $(projectRoot)/requirements.txt
                  displayName: Install dependencies
                - task: AzureCLI@2
                  displayName: Deploy registry model to test
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      . $(Pipeline.Workspace)/mlops-venv/bin/activate
                      cd $(projectRoot)
                      PYTHONPATH=. python pipelines/deploy_model.py \
                        --env test \
                        --model-name $(modelName) \
                        --model-version $(REGISTRY_MODEL_VERSION) \
                        --source registry
                - task: AzureCLI@2
                  displayName: Fetch deployment logs on failure
                  condition: failed()
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az extension add -n ml -y 2>/dev/null || true
                      az ml online-deployment get-logs --name blue \
                        --endpoint-name used-car-price-test \
                        --workspace-name aml-ws-test --resource-group rg-aml-test \
                        --lines 200 || echo "No deployment logs available."
                - task: AzureCLI@2
                  displayName: Smoke test test endpoint
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      . $(Pipeline.Workspace)/mlops-venv/bin/activate
                      cd $(projectRoot)
                      PYTHONPATH=. python pipelines/smoke_test_endpoint.py --env test

  - stage: Deploy_Prod
    displayName: Deploy To Prod
    dependsOn:
      - Deploy_Test
      - Promote_To_Test
    condition: succeeded()
    variables:
      REGISTRY_MODEL_VERSION: $[ stageDependencies.Promote_To_Test.promote_model.outputs['promote_model.promote.REGISTRY_MODEL_VERSION'] ]
    jobs:
      - deployment: deploy_prod
        environment: aml-prod
        pool:
          name: $(selfHostedPool)
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - script: |
                    python3 -m venv $(Pipeline.Workspace)/mlops-venv
                    . $(Pipeline.Workspace)/mlops-venv/bin/activate
                    python -m pip install --upgrade pip
                    pip install -r $(projectRoot)/requirements.txt
                  displayName: Install dependencies
                - task: AzureCLI@2
                  displayName: Deploy registry model to prod
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      . $(Pipeline.Workspace)/mlops-venv/bin/activate
                      cd $(projectRoot)
                      PYTHONPATH=. python pipelines/deploy_model.py \
                        --env prod \
                        --model-name $(modelName) \
                        --model-version $(REGISTRY_MODEL_VERSION) \
                        --source registry
                - task: AzureCLI@2
                  displayName: Fetch deployment logs on failure
                  condition: failed()
                  inputs:
                    azureSubscription: '$(serviceConnection)'
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az extension add -n ml -y 2>/dev/null || true
                      az ml online-deployment get-logs --name blue \
                        --endpoint-name used-car-price-prod \
                        --workspace-name aml-ws-prod --resource-group rg-aml-prod \
                        --lines 200 || echo "No deployment logs available."

  - stage: Configure_Monitoring
    displayName: Configure Monitoring Assets
    dependsOn: Deploy_Prod
    condition: succeeded()
    jobs:
      - job: monitoring
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
          - script: |
              python -m pip install --upgrade pip
              pip install -r $(projectRoot)/requirements.txt
            displayName: Install dependencies
          - task: AzureCLI@2
            displayName: Generate monitoring policy
            inputs:
              azureSubscription: '$(serviceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd $(projectRoot)
                PYTHONPATH=. python pipelines/generate_monitoring_config.py \
                  --env prod \
                  --output monitoring/generated-prod-config.json
