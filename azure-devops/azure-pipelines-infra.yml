trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/bicep/terraform/*
      - azure-devops/azure-pipelines-infra.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/bicep/terraform/*
      - azure-devops/azure-pipelines-infra.yml

variables:
  - group: aml-infra-tfvars
  - name: terraformVersion
    value: '1.9.8'
  - name: projectRoot
    value: '.'
  - name: terraformRoot
    value: 'infra/bicep/terraform'

stages:
  - stage: Terraform_Validate_And_Plan
    displayName: Terraform Validate And Plan
    jobs:
      - job: terraform_plan
        displayName: Terraform Plan
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: '$(terraformVersion)'

          - script: |
              terraform fmt -check -recursive
            workingDirectory: $(terraformRoot)
            displayName: Terraform fmt check

          - script: |
              terraform init
            workingDirectory: $(terraformRoot)
            env:
              TF_VAR_azure_devops_pat: $(AZURE_DEVOPS_PAT)
            displayName: Terraform init

          - script: |
              terraform validate
            workingDirectory: $(terraformRoot)
            env:
              TF_VAR_azure_devops_pat: $(AZURE_DEVOPS_PAT)
            displayName: Terraform validate

          - script: |
              terraform plan -out=tfplan
            workingDirectory: $(terraformRoot)
            env:
              TF_VAR_subscription_id: $(TF_VAR_subscription_id)
              TF_VAR_subscription_name: $(TF_VAR_subscription_name)
              TF_VAR_tenant_id: $(TF_VAR_tenant_id)
              TF_VAR_location: $(TF_VAR_location)
              TF_VAR_prefix: $(TF_VAR_prefix)
              TF_VAR_registry_name: $(TF_VAR_registry_name)
              TF_VAR_create_registry: $(TF_VAR_create_registry)
              TF_VAR_enable_private_networking: $(TF_VAR_enable_private_networking)
              TF_VAR_self_hosted_agents_enabled: $(TF_VAR_self_hosted_agents_enabled)
              TF_VAR_vnet_address_space: $(TF_VAR_vnet_address_space)
              TF_VAR_private_endpoints_subnet_prefix: $(TF_VAR_private_endpoints_subnet_prefix)
              TF_VAR_agents_subnet_prefix: $(TF_VAR_agents_subnet_prefix)
              TF_VAR_azure_devops_org_service_url: $(TF_VAR_azure_devops_org_service_url)
              TF_VAR_azure_devops_project_name: $(TF_VAR_azure_devops_project_name)
              TF_VAR_service_connection_name: $(TF_VAR_service_connection_name)
              TF_VAR_existing_service_endpoint_id: $(TF_VAR_existing_service_endpoint_id)
              TF_VAR_azure_auth_mode: $(TF_VAR_azure_auth_mode)
              TF_VAR_service_principal_id: $(TF_VAR_service_principal_id)
              TF_VAR_service_principal_key: $(TF_VAR_service_principal_key)
              TF_VAR_azure_devops_pat: $(AZURE_DEVOPS_PAT)
            displayName: Terraform plan

          - task: PublishPipelineArtifact@1
            displayName: Publish Terraform plan
            inputs:
              targetPath: '$(terraformRoot)/tfplan'
              artifact: 'terraform-plan'

  - stage: Terraform_Apply
    displayName: Terraform Apply
    dependsOn: Terraform_Validate_And_Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: terraform_apply
        displayName: Terraform Apply
        environment: aml-platform-infra
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: '$(terraformVersion)'

                - task: DownloadPipelineArtifact@2
                  displayName: Download Terraform plan
                  inputs:
                    artifact: 'terraform-plan'
                    path: '$(Pipeline.Workspace)/terraform-plan'

                - script: |
                    terraform init
                  workingDirectory: $(terraformRoot)
                  env:
                    TF_VAR_azure_devops_pat: $(AZURE_DEVOPS_PAT)
                  displayName: Terraform init

                - script: |
                    cp "$(Pipeline.Workspace)/terraform-plan/tfplan" tfplan
                    terraform apply -auto-approve tfplan
                  workingDirectory: $(terraformRoot)
                  env:
                    TF_VAR_subscription_id: $(TF_VAR_subscription_id)
                    TF_VAR_subscription_name: $(TF_VAR_subscription_name)
                    TF_VAR_tenant_id: $(TF_VAR_tenant_id)
                    TF_VAR_location: $(TF_VAR_location)
                    TF_VAR_prefix: $(TF_VAR_prefix)
                    TF_VAR_registry_name: $(TF_VAR_registry_name)
                    TF_VAR_create_registry: $(TF_VAR_create_registry)
                    TF_VAR_enable_private_networking: $(TF_VAR_enable_private_networking)
                    TF_VAR_self_hosted_agents_enabled: $(TF_VAR_self_hosted_agents_enabled)
                    TF_VAR_vnet_address_space: $(TF_VAR_vnet_address_space)
                    TF_VAR_private_endpoints_subnet_prefix: $(TF_VAR_private_endpoints_subnet_prefix)
                    TF_VAR_agents_subnet_prefix: $(TF_VAR_agents_subnet_prefix)
                    TF_VAR_azure_devops_org_service_url: $(TF_VAR_azure_devops_org_service_url)
                    TF_VAR_azure_devops_project_name: $(TF_VAR_azure_devops_project_name)
                    TF_VAR_service_connection_name: $(TF_VAR_service_connection_name)
                    TF_VAR_existing_service_endpoint_id: $(TF_VAR_existing_service_endpoint_id)
                    TF_VAR_azure_auth_mode: $(TF_VAR_azure_auth_mode)
                    TF_VAR_service_principal_id: $(TF_VAR_service_principal_id)
                    TF_VAR_service_principal_key: $(TF_VAR_service_principal_key)
                    TF_VAR_azure_devops_pat: $(AZURE_DEVOPS_PAT)
                  displayName: Terraform apply
