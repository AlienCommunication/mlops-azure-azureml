trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/bicep/terraform/*
      - azure-devops/azure-pipelines-infra.yml

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/bicep/terraform/*
      - azure-devops/azure-pipelines-infra.yml

variables:
  - group: aml-infra-tfvars
  - name: terraformVersion
    value: '1.9.8'
  - name: projectRoot
    value: '.'
  - name: terraformRoot
    value: 'infra/bicep/terraform'
  - name: bootstrapAzureServiceConnection
    value: 'az-mlops-sc'
  - name: terraformBackendResourceGroup
    value: '$(TF_BACKEND_RESOURCE_GROUP)'
  - name: terraformBackendStorageAccount
    value: '$(TF_BACKEND_STORAGE_ACCOUNT)'
  - name: terraformBackendContainer
    value: '$(TF_BACKEND_CONTAINER)'
  - name: terraformBackendKey
    value: '$(TF_BACKEND_KEY)'

stages:
  - stage: Terraform_Validate_And_Plan
    displayName: Terraform Validate And Plan
    jobs:
      - job: terraform_plan
        displayName: Terraform Plan
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self

          - task: TerraformInstaller@1
            displayName: Install Terraform
            inputs:
              terraformVersion: '$(terraformVersion)'

          - script: |
              terraform fmt -check -recursive
            workingDirectory: $(terraformRoot)
            displayName: Terraform fmt check

          - task: AzureCLI@2
            displayName: Ensure Terraform state backend exists
            inputs:
              azureSubscription: '$(bootstrapAzureServiceConnection)'
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd "$(terraformRoot)"
                export TF_BACKEND_RESOURCE_GROUP="$(terraformBackendResourceGroup)"
                export TF_BACKEND_STORAGE_ACCOUNT="$(terraformBackendStorageAccount)"
                export TF_BACKEND_CONTAINER="$(terraformBackendContainer)"
                export TF_BACKEND_LOCATION="$(TF_VAR_location)"
                bash bootstrap_backend.sh
            env:
              TF_VAR_location: $(TF_VAR_location)

          - task: AzureCLI@2
            displayName: Terraform init, validate, and plan
            inputs:
              azureSubscription: '$(bootstrapAzureServiceConnection)'
              addSpnToEnvironment: true
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                cd "$(terraformRoot)"
                export ARM_CLIENT_ID="$servicePrincipalId"
                export ARM_TENANT_ID="$tenantId"
                export ARM_SUBSCRIPTION_ID="$(TF_VAR_subscription_id)"
                # Workload identity federation connections expose idToken instead of a secret.
                if [ -n "${idToken:-}" ]; then
                  export ARM_USE_OIDC=true
                  export ARM_OIDC_TOKEN="$idToken"
                else
                  export ARM_CLIENT_SECRET="$servicePrincipalKey"
                fi
                terraform init \
                  -reconfigure \
                  -backend-config="resource_group_name=$(terraformBackendResourceGroup)" \
                  -backend-config="storage_account_name=$(terraformBackendStorageAccount)" \
                  -backend-config="container_name=$(terraformBackendContainer)" \
                  -backend-config="key=$(terraformBackendKey)"
                terraform validate
                terraform plan -out=tfplan
            env:
              TF_VAR_subscription_id: $(TF_VAR_subscription_id)
              TF_VAR_subscription_name: $(TF_VAR_subscription_name)
              TF_VAR_tenant_id: $(TF_VAR_tenant_id)
              TF_VAR_location: $(TF_VAR_location)
              TF_VAR_prefix: $(TF_VAR_prefix)
              TF_VAR_registry_name: $(TF_VAR_registry_name)
              TF_VAR_create_registry: $(TF_VAR_create_registry)
              TF_VAR_enable_private_networking: $(TF_VAR_enable_private_networking)
              TF_VAR_self_hosted_agents_enabled: $(TF_VAR_self_hosted_agents_enabled)
              TF_VAR_vnet_address_space: $(TF_VAR_vnet_address_space)
              TF_VAR_private_endpoints_subnet_prefix: $(TF_VAR_private_endpoints_subnet_prefix)
              TF_VAR_agents_subnet_prefix: $(TF_VAR_agents_subnet_prefix)
              TF_VAR_azure_devops_org_service_url: $(TF_VAR_azure_devops_org_service_url)
              TF_VAR_azure_devops_project_name: $(TF_VAR_azure_devops_project_name)
              TF_VAR_service_connection_name: $(TF_VAR_service_connection_name)
              TF_VAR_existing_service_endpoint_id: $(TF_VAR_existing_service_endpoint_id)
              TF_VAR_azure_auth_mode: $(TF_VAR_azure_auth_mode)
              TF_VAR_service_principal_id: $(TF_VAR_service_principal_id)
              TF_VAR_service_principal_key: $(TF_VAR_service_principal_key)
              TF_VAR_azure_devops_pat: $(AZURE_DEVOPS_PAT)

          - task: PublishPipelineArtifact@1
            displayName: Publish Terraform plan
            inputs:
              targetPath: '$(terraformRoot)/tfplan'
              artifact: 'terraform-plan'

  - stage: Terraform_Apply
    displayName: Terraform Apply
    dependsOn: Terraform_Validate_And_Plan
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: terraform_apply
        displayName: Terraform Apply
        environment: aml-platform-infra
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: TerraformInstaller@1
                  displayName: Install Terraform
                  inputs:
                    terraformVersion: '$(terraformVersion)'

                - task: DownloadPipelineArtifact@2
                  displayName: Download Terraform plan
                  inputs:
                    artifact: 'terraform-plan'
                    path: '$(Pipeline.Workspace)/terraform-plan'

                - task: AzureCLI@2
                  displayName: Terraform apply
                  inputs:
                    azureSubscription: '$(bootstrapAzureServiceConnection)'
                    addSpnToEnvironment: true
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      cd "$(terraformRoot)"
                      export ARM_CLIENT_ID="$servicePrincipalId"
                      export ARM_TENANT_ID="$tenantId"
                      export ARM_SUBSCRIPTION_ID="$(TF_VAR_subscription_id)"
                      # Workload identity federation connections expose idToken instead of a secret.
                      if [ -n "${idToken:-}" ]; then
                        export ARM_USE_OIDC=true
                        export ARM_OIDC_TOKEN="$idToken"
                      else
                        export ARM_CLIENT_SECRET="$servicePrincipalKey"
                      fi
                      terraform init \
                        -reconfigure \
                        -backend-config="resource_group_name=$(terraformBackendResourceGroup)" \
                        -backend-config="storage_account_name=$(terraformBackendStorageAccount)" \
                        -backend-config="container_name=$(terraformBackendContainer)" \
                        -backend-config="key=$(terraformBackendKey)"
                      cp "$(Pipeline.Workspace)/terraform-plan/tfplan" tfplan
                      terraform apply -auto-approve tfplan
                  env:
                    TF_VAR_subscription_id: $(TF_VAR_subscription_id)
                    TF_VAR_subscription_name: $(TF_VAR_subscription_name)
                    TF_VAR_tenant_id: $(TF_VAR_tenant_id)
                    TF_VAR_location: $(TF_VAR_location)
                    TF_VAR_prefix: $(TF_VAR_prefix)
                    TF_VAR_registry_name: $(TF_VAR_registry_name)
                    TF_VAR_create_registry: $(TF_VAR_create_registry)
                    TF_VAR_enable_private_networking: $(TF_VAR_enable_private_networking)
                    TF_VAR_self_hosted_agents_enabled: $(TF_VAR_self_hosted_agents_enabled)
                    TF_VAR_vnet_address_space: $(TF_VAR_vnet_address_space)
                    TF_VAR_private_endpoints_subnet_prefix: $(TF_VAR_private_endpoints_subnet_prefix)
                    TF_VAR_agents_subnet_prefix: $(TF_VAR_agents_subnet_prefix)
                    TF_VAR_azure_devops_org_service_url: $(TF_VAR_azure_devops_org_service_url)
                    TF_VAR_azure_devops_project_name: $(TF_VAR_azure_devops_project_name)
                    TF_VAR_service_connection_name: $(TF_VAR_service_connection_name)
                    TF_VAR_existing_service_endpoint_id: $(TF_VAR_existing_service_endpoint_id)
                    TF_VAR_azure_auth_mode: $(TF_VAR_azure_auth_mode)
                    TF_VAR_service_principal_id: $(TF_VAR_service_principal_id)
                    TF_VAR_service_principal_key: $(TF_VAR_service_principal_key)
                    TF_VAR_azure_devops_pat: $(AZURE_DEVOPS_PAT)
